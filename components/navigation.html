            <script defer="" data-name="navigation-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const mobileToggle = document.getElementById("mobile-nav-toggle")
                  const mobileClose = document.getElementById("mobile-nav-close")
                  const mobileOverlay = document.getElementById("mobile-overlay")
                  const body = document.body

                  function toggleMenu(isOpen) {
                    mobileOverlay.classList.toggle("is-active", isOpen)
                    mobileToggle.setAttribute("aria-expanded", isOpen)

                    if (isOpen) {
                      body.style.overflow = "hidden"
                    } else {
                      body.style.overflow = ""
                    }
                  }

                  mobileToggle.addEventListener("click", () => toggleMenu(true))
                  mobileClose.addEventListener("click", () => toggleMenu(false))

                  // Close menu when clicking a link
                  const mobileLinks = mobileOverlay.querySelectorAll(".navigation-mobile-link")
                  mobileLinks.forEach((link) => {
                    link.addEventListener("click", () => toggleMenu(false))
                  })

                  // Close on Escape key
                  document.addEventListener("keydown", (e) => {
                    if (e.key === "Escape" && mobileOverlay.classList.contains("is-active")) {
                      toggleMenu(false)
                    }
                  })
                })()
              });
            </script>
          </div>
        </div>
